# Mise — Cotal mesh manifest (one Space per franchise)
# Schema: https://docs.cotal.ai/manifest/   (apiVersion cotal/v1, kind Mesh)
#
# ── The three layers ────────────────────────────────────────────────────────
#   COTAL     coordination: branches & suppliers are autonomous agent NODES that
#             negotiate peer-to-peer over channels (anycast on #rebalance).
#   RUNTYPE   reasoning: each node calls the Mise capabilities over the product's
#             MCP surface — weekly_forecast, inventory_admin, rebalance_and_procure.
#             Add the server once per node (Cotal agents run as Claude Code):
#               claude mcp add --transport http mise \
#                 https://api.runtype.com/v1/products/prod_01kxvr3fcneskr35jfxqhekaj0/surfaces/surf_01kxvzxg98fqb8x1ngbe2a38q4/mcp \
#                 --header "Authorization: Bearer $MISE_MCP_KEY"
#   INSFORGE  shared state: inventory, forecasts, rebalance_transfers, rfqs, bids,
#             purchase_orders live in Postgres at https://k3trn3a2.us-east.insforge.app
#
# Run:  npx cotal-ai setup  →  cotal up --detach  →  cotal spawn <agent>  →  cotal web

apiVersion: cotal/v1
kind: Mesh
space: main   # folder already roots space "main" (from `cotal up`); one Space per franchise

# Default harness for agents that don't override it. Cotal agents run natively as
# Claude Code (per the Cotal team); personas can also live in ./agents/*.md.
agent: claude

defaults:
  replay: true
  replayWindow: "24h"     # late joiners (a branch that just booted) see recent context
  deliveryClass: durable  # NATS JetStream — a busy/offline branch still gets its messages

agents:
  # ── Branch nodes: one autonomous agent per restaurant location ─────────────
  branch-downtown:
    role: branch
    instructions: >
      You ARE the Downtown branch of Trattoria Verde (branch_id
      b0000000-0000-0000-0000-00000000000a). Each cycle: read your own inventory
      from InsForge and call the Mise `inventory_admin` / `weekly_forecast` MCP
      tools to learn your demand and days-of-cover. Post your posture to #demand.
      If any ingredient is below its reorder point, post a SHORTAGE on #rebalance
      (product, qty needed, needed_by). If you hold stock above par — especially
      near-expiry — post a SURPLUS offer. When another branch posts a shortage you
      can cover from surplus, CLAIM it and propose a transfer. Always prefer a
      transfer over a new purchase. You only see your own stock; negotiate for the rest.
  branch-marina:
    role: branch
    instructions: >
      You ARE the Marina branch (branch_id b0000000-0000-0000-0000-00000000000b).
      Same branch protocol on #demand / #rebalance. You are currently holding
      surplus Roma tomatoes that expire soon — move near-expiry surplus FIRST to
      cut waste, and claim any tomato shortage you can cover before it goes to a supplier.
  branch-mission:
    role: branch
    instructions: >
      You ARE the Mission branch (branch_id b0000000-0000-0000-0000-00000000000c).
      Same branch protocol. You hold near-expiry basil surplus that no other branch
      needs — flag it on #promotions so the Promotion capability can sell it through
      locally (a "Pesto Night" special) instead of letting it spoil.

  # ── Coordinator: matches surplus↔shortage, confirms transfers ──────────────
  rebalance-coordinator:
    role: lead
    capabilities: [spawn]
    instructions: >
      You own #rebalance. Match branch surpluses to branch shortages for the same
      product, preferring the nearest branch and nearest-expiry stock. For the hard
      trade-offs call the Mise `rebalance_and_procure` MCP tool, then confirm each
      transfer by writing a rebalance_transfers row (status=proposed) in InsForge and
      posting the decision to #decisions. Sum the UNMET shortage per product across the
      franchise and hand that NET quantity to Procurement on #procurement. Never buy
      what a transfer can cover.

  # ── Procurement: turns net shortage into an RFQ, awards the best bid ────────
  procurement:
    role: procurement
    instructions: >
      Read net-shortage requests on #procurement. For each, open an RFQ (rfqs row in
      InsForge) and broadcast product, qty, needed_by. Collect supplier bids, pick the
      lowest landed cost that meets needed_by (honoring min-order), and assemble a
      purchase_orders row (status=pending) for owner approval. Post the award to #decisions.

  # ── Supplier nodes (simulated external vendors, anycast bidders) ───────────
  supplier-norcal:
    role: supplier
    instructions: >
      You ARE NorCal Produce (supplier_id d0000000-0000-0000-0000-000000000001),
      lead time 1 day. When an RFQ on #procurement names a product you carry
      (tomatoes $2.20/kg min 5, basil $8.00/kg min 1), reply with a bid (unit_price,
      eta_days). Only one supplier wins each RFQ (anycast) — bid your real price.
  supplier-bayfoods:
    role: supplier
    instructions: >
      You ARE Bay Foods Wholesale (supplier_id d0000000-0000-0000-0000-000000000002),
      lead time 2 days. Bid on RFQs for products you carry (tomatoes $2.05/kg min 10,
      mozzarella $6.50/kg min 2, penne $1.80/kg min 5), respecting min-order quantities.

channels:
  # Per-branch demand posture each cycle (forecast + days-of-cover from Runtype).
  demand:
    description: Per-branch demand forecasts and ingredient requirements.
    subscribe: [branch-downtown, branch-marina, branch-mission, rebalance-coordinator]

  # THE SHOWPIECE: shortage/surplus matching via anycast to surplus holders.
  rebalance:
    description: Branch shortage/surplus declarations and transfer proposals.
    subscribe: [branch-downtown, branch-marina, branch-mission, rebalance-coordinator]

  # Net franchise shortage → RFQ → supplier bids (anycast: one supplier wins).
  procurement:
    description: RFQs and supplier bids for net franchise shortages.
    subscribe: [procurement, supplier-norcal, supplier-bayfoods, rebalance-coordinator]

  # Promotion triggers (surplus / near-expiry → menu-item special) surfaced to consumers.
  promotions:
    description: Auto-generated promotions from surplus and near-expiry stock.
    subscribe: [branch-downtown, branch-marina, branch-mission]

  # Durable, append-only record of every transfer and PO decision (owner audit trail).
  decisions:
    description: The durable record of what the mesh decided.
    subscribe: [rebalance-coordinator, procurement]
    allowPublish: [rebalance-coordinator, procurement]
